# Sync this fork with upstream eracle/OpenOutreach.
# Runs daily at 00:00 UTC and can be triggered manually.
name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/eracle/OpenOutreach.git || true
          git fetch upstream master

      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/master --no-edit

      - name: Push to origin
        run: git push origin master

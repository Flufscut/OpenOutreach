<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOutreach</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a365d 100%);
            color: #e2e8f0;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        .links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .link {
            display: block;
            padding: 1rem 2rem;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .link:hover { background: #1d4ed8; }
        .link.admin { background: #475569; }
        .link.admin:hover { background: #334155; }
    </style>
</head>
<body>
    <h1>OpenOutreach</h1>
    <p class="subtitle">LinkedIn automation for B2B lead generation</p>
    <nav class="links">
        <a href="/crm/" class="link">CRM</a>
        <a href="/admin/" class="link admin">Django Admin</a>
    </nav>
</body>
</html>
